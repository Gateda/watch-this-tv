name: Build Fire TV APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Generate Fire TV home-screen banner
        run: |
          sudo apt-get update -y && sudo apt-get install -y imagemagick
          convert -size 320x180 xc:'#0A0C10' -gravity center -pointsize 26 \
            -fill '#D4A537' -annotate 0 'WATCH THIS' \
            android/app/src/main/res/drawable/banner.png

      - name: Patch AndroidManifest for Fire TV
        run: python3 patch_manifest.py

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Publish APK as a release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Watch This — build ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
